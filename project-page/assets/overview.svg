<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" role="img" font-family="IBM Plex Mono, DejaVu Sans Mono, monospace">
  <rect width="920" height="340" fill="#ffffff"/>

  <!-- shared layer axis -->
  <g stroke="#ececec">
    <line x1="150" y1="58" x2="150" y2="284"/>
    <line x1="234" y1="58" x2="234" y2="284"/>
    <line x1="318" y1="58" x2="318" y2="284"/>
    <line x1="402" y1="58" x2="402" y2="284"/>
    <line x1="486" y1="58" x2="486" y2="284"/>
    <line x1="570" y1="58" x2="570" y2="284"/>
    <line x1="654" y1="58" x2="654" y2="284"/>
  </g>
  <text x="40" y="306" font-size="11" fill="#8a9094">shallow layers</text>
  <text x="560" y="306" font-size="11" fill="#8a9094">deeper layers (full depth)</text>

  <!-- ===== Top lane: confidence-only ===== -->
  <text x="40" y="50" font-size="12.5" font-weight="700" fill="#b1493b">Confidence-only early exit</text>
  <rect x="40" y="70" width="56" height="30" rx="6" fill="#f6e3df" stroke="#d8a99f"/>
  <text x="68" y="90" font-size="14" font-weight="700" fill="#7a2c22" text-anchor="middle">no</text>
  <line x1="98" y1="85" x2="318" y2="85" stroke="#b1493b" stroke-width="2.5" stroke-dasharray="6 6"/>
  <circle cx="318" cy="85" r="6" fill="#b1493b"/>
  <text x="110" y="124" font-size="11" fill="#5b6266">stops early, before the prediction has settled</text>

  <rect x="690" y="58" width="200" height="74" rx="8" fill="#faf0ee" stroke="#d8a99f"/>
  <text x="704" y="80" font-size="11.5" font-weight="700" fill="#7a2c22">acute cardiopulmonary</text>
  <text x="704" y="96" font-size="11.5" font-weight="700" fill="#7a2c22">disease</text>
  <rect x="704" y="106" width="120" height="18" rx="5" fill="#e7c7c0"/>
  <text x="712" y="119" font-size="10.5" font-weight="700" fill="#7a2c22">finding reversed</text>

  <!-- ===== Bottom lane: TokenTriage ===== -->
  <text x="40" y="196" font-size="12.5" font-weight="700" fill="#0a4f47">TokenTriage</text>
  <rect x="40" y="216" width="56" height="30" rx="6" fill="#dff0ea" stroke="#9fcdc1"/>
  <text x="68" y="236" font-size="14" font-weight="700" fill="#0a4f47" text-anchor="middle">no</text>
  <line x1="98" y1="231" x2="612" y2="231" stroke="#0e6f63" stroke-width="2.6"/>
  <circle cx="612" cy="231" r="6" fill="#0e6f63"/>
  <text x="110" y="270" font-size="11" fill="#5b6266">waits for a deeper layer, stable for k layers in a row</text>

  <rect x="690" y="204" width="200" height="74" rx="8" fill="#eaf4f1" stroke="#9fcdc1"/>
  <text x="704" y="226" font-size="11.5" font-weight="700" fill="#0a4f47"><tspan fill="#0e6f63">no</tspan> acute cardiopulmonary</text>
  <text x="704" y="242" font-size="11.5" font-weight="700" fill="#0a4f47">disease</text>
  <rect x="704" y="252" width="128" height="18" rx="5" fill="#bfdcd4"/>
  <text x="712" y="265" font-size="10.5" font-weight="700" fill="#0a4f47">finding preserved</text>
</svg>
